name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version'
        required: false

jobs:
  release:
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@7b055eca5ce771ff254fbec2697c0fc1c7207e1e # 6.4.0
    with:
      publishToNpmJS: true
      skipJavascriptReleasabilityChecks: true
      useNpmTrustedPublisher: true
    permissions:
      id-token: write
      contents: write
