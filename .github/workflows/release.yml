name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version'
        required: false

jobs:
  release:
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@d9afbb6f48da6012ebf64d8247d7b44995c7cace # 6.7.0
    with:
      publishToNpmJS: true
      skipJavascriptReleasabilityChecks: true
      useNpmTrustedPublisher: true
    permissions:
      id-token: write
      contents: write
